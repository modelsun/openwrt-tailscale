name: Smaller Tailscale Build Pipeline

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [ build-tailscale ]

permissions:
  contents: read

env:
  SOFTWARE_NAME: "Tailscale"
  REPO: "tailscale/tailscale"
  REPO_SMALL: "GuNanOvO/openwrt-tailscale"
  REPO_SMALL_NAME: "openwrt-tailscale"
  REPO_SMALL_OWNER: "GuNanOvO"
  ARTIFACT_DIR: "artifacts"
  OPENWRT_IPK_SDK: "24.10.4"
  OPENWRT_APK_SDK: "25.12.0"
  SKIP_TARGETS_24: "riscv64_generic" # 25.12 renamed, skip for 24.10
  SKIP_TARGETS_25: "mips_4kec riscv64_riscv64" # skip for 25.12, removed: mips_4kec; renamed: riscv64_riscv64 -> riscv64_generic

jobs:
  prepare:
    name: Prepare UPX and Go
    runs-on: ubuntu-latest
    outputs:
      upx_ver: ${{ steps.check_upx.outputs.upx_ver }}
      go_version: ${{ steps.check_go.outputs.go_version }}
    steps:
      # ----------------- UPX -----------------
      - name: Check Latest UPX Version
        id: check_upx
        run: |
          UPX_TAG=$(curl -s https://api.github.com/repos/upx/upx/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "UPX_TAG=$UPX_TAG" >> "$GITHUB_ENV"

          UPX_VER="${UPX_TAG#v}"
          echo "Detected UPX Version: $UPX_VER"
          
          echo "upx_ver=$UPX_VER" >> "$GITHUB_OUTPUT"
          echo "UPX_VER=$UPX_VER" >> "$GITHUB_ENV"

      - name: Restore UPX Cache
        id: cache_upx
        uses: actions/cache@v5
        with:
          path: upx
          key: upx-linux-amd64-${{ steps.check_upx.outputs.upx_ver }}

      - name: Prepare UPX
        if: steps.cache_upx.outputs.cache-hit != 'true'
        run: |
          UPX_URL="https://github.com/upx/upx/releases/download/$UPX_TAG/upx-${UPX_VER}-amd64_linux.tar.xz"
          echo "Downloading UPX from: $UPX_URL"
          mkdir -p upx
          curl -L -o upx.tar.xz "$UPX_URL"
          tar -xf upx.tar.xz -C upx --strip-components=1
          chmod +x upx/upx
          rm -f upx.tar.xz

      - name: Save UPX Cache
        if: steps.cache_upx.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: upx
          key: upx-linux-amd64-${{ steps.check_upx.outputs.upx_ver }}

      # ----------------- Go -----------------
      - name: Check Latest Go Version
        id: check_go
        run: |
          GO_TAG=$(curl -s https://go.dev/VERSION?m=text | head -1)
          echo "GO_TAG=$GO_TAG" >> "$GITHUB_ENV"

          GO_VER="${GO_TAG#go}"
          echo "Detected Go Version: $GO_VER"
          
          echo "go_version=$GO_VER" >> "$GITHUB_OUTPUT"
          echo "GO_VERSION=$GO_VER" >> "$GITHUB_ENV"

      - name: Restore Go Cache
        id: cache_go
        uses: actions/cache@v5
        with:
          path: go
          key: go-linux-amd64-${{ steps.check_go.outputs.go_version }}

      - name: Prepare Go
        if: steps.cache_go.outputs.cache-hit != 'true'
        run: |
          GO_OS=linux
          GO_ARCH=amd64
          GO_URL="https://go.dev/dl/$GO_TAG.$GO_OS-$GO_ARCH.tar.gz"
          echo "Downloading Go from: $GO_URL"
          mkdir -p go
          curl -L -o go.tar.gz "$GO_URL"
          tar -C go -xzf go.tar.gz --strip-components=1
          rm -f go.tar.gz
      
      - name: Save Go Cache
        if: steps.cache_go.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: go
          key: go-linux-amd64-${{ steps.check_go.outputs.go_version }}

  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_build_version.outputs.version }}
      date: ${{ steps.get_build_date.outputs.date }}
    needs: prepare
    strategy:
      matrix:
        platform:
          - 'aarch64_cortex-a53'
          - 'aarch64_cortex-a72'
          - 'aarch64_cortex-a76'
          - 'aarch64_generic'
          - 'arm_arm1176jzf-s_vfp'
          - 'arm_arm926ej-s'
          - 'arm_cortex-a15_neon-vfpv4'
          - 'arm_cortex-a5_vfpv4'
          - 'arm_cortex-a7'
          - 'arm_cortex-a7_neon-vfpv4'
          - 'arm_cortex-a7_vfpv4'
          - 'arm_cortex-a8_vfpv3'
          - 'arm_cortex-a9'
          - 'arm_cortex-a9_neon'
          - 'arm_cortex-a9_vfpv3-d16'
          - 'arm_fa526'
          - 'arm_xscale'
          - 'i386_pentium-mmx'
          - 'i386_pentium4'
          - 'loongarch64_generic'
          - 'mips64_mips64r2'
          - 'mips64_octeonplus'
          - 'mips64el_mips64r2'
          - 'mips_24kc'
          - 'mips_4kec' # 25.12 removed
          - 'mips_mips32'
          - 'mipsel_24kc'
          - 'mipsel_24kc_24kf'
          - 'mipsel_74kc'
          - 'mipsel_mips32'
          - 'riscv64_riscv64'
          - 'x86_64'
          - 'riscv64_generic' # 25.12 renamed
      fail-fast: true

    steps:

      # PREPARE TOOLS

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: main
          path: repo

      - name: Set Build Version
        id: get_build_version
        run: |
          VERSION=$(sed -n 's/^PKG_VERSION:=\(.*\)/\1/p' repo/package/tailscale/Makefile | tr -d '[:space:]')
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          

          echo "Parsed version: $VERSION"

          echo "Directories prepared:"
          ls -la

      - name: Set Build Timestamp
        id: get_build_date
        run: |
          echo "date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Prepare Build Scripts, Package Files, and Keys
        env:
          USIGN_SECRET_KEY_B64: ${{ secrets.USIGN_SECRET_KEY_B64 }}
          RSA_SECRET_KEY_B64: ${{ secrets.RSA_SECRET_KEY_B64 }}
        run: |
          mkdir build_scripts
          cp repo/build_scripts/*.sh build_scripts/

          mkdir tailscale
          cp -r repo/package/tailscale/. tailscale/
          
          mkdir keys
          echo "$USIGN_SECRET_KEY_B64" | base64 -d > keys/key-build.sec
          echo "$RSA_SECRET_KEY_B64" | base64 -d > keys/key-build.rsa

      - name: Restore UPX Cache
        uses: actions/cache@v5
        id: cache-upx
        with:
          path: upx
          key: upx-linux-amd64-${{ needs.prepare.outputs.upx_ver }}

      - name: Restore Go Cache
        uses: actions/cache@v5
        id: cache-go
        with:
          path: go
          key: go-linux-amd64-${{ needs.prepare.outputs.go_version }}

      - name: Pull OpenWRT 24.10 SDK Docker Image
        run: |
          if echo "${{ env.SKIP_TARGETS_24 }}" | grep -qw "${{ matrix.platform }}"; then
            echo "Skipping pull of OpenWRT 24.10 SDK for ${{ matrix.platform }} due to unspported target."
          else
            docker pull ghcr.io/openwrt/sdk:${{ matrix.platform }}-V${{ env.OPENWRT_IPK_SDK }}
          fi

      - name: Pull OpenWRT 25.12 SDK Docker Image
        run: |
          if echo "${{ env.SKIP_TARGETS_25 }}" | grep -qw "${{ matrix.platform }}"; then
            echo "Skipping pull of OpenWRT 25.12 SDK for ${{ matrix.platform }} due to unsupported target."
          else
            docker pull ghcr.io/openwrt/sdk:${{ matrix.platform }}-V${{ env.OPENWRT_APK_SDK }}
          fi

      # BUILD PACKAGES

      - name: Prepare Directories and Permissions
        run: |
          mkdir -p bin
          mkdir -p "${{ env.ARTIFACT_DIR }}"
          chmod -R 777 bin || true
          echo "Directories prepared with permissions:"
          ls -la

      - name: Build with OpenWRT 24.10 SDK Docker
        run: |
          if echo "${{ env.SKIP_TARGETS_24 }}" | grep -qw "${{ matrix.platform }}"; then
            echo "Skipping build with OpenWRT 24.10 SDK for ${{ matrix.platform }} due to unspported target."
          else
            docker run --rm \
              -v "$(pwd)/bin:/builder/bin:z" \
              -v "$(pwd)/build_scripts:/builder/build_scripts:ro,z" \
              -v "$(pwd)/tailscale:/builder/tailscale:ro,z" \
              -v "$(pwd)/keys:/builder/keys:ro,z" \
              -v "$(pwd)/upx:/builder/upx:ro,z" \
              -v "$(pwd)/go:/builder/go:ro,z" \
              -e TERM=xterm \
              -e FORCE=1 \
              ghcr.io/openwrt/sdk:${{ matrix.platform }}-V${{ env.OPENWRT_IPK_SDK }} \
              bash /builder/build_scripts/build_ipk.sh "${{ steps.get_build_version.outputs.version }}" "${{ matrix.platform }}"
          fi

      - name: Build with OpenWRT 25.12 SDK Docker
        run: |
          if echo "${{ env.SKIP_TARGETS_25 }}" | grep -qw "${{ matrix.platform }}"; then
            echo "Skipping build with OpenWRT 25.12 SDK for ${{ matrix.platform }} due to unsupported target."
          else
            docker run --rm \
              -v "$(pwd)/bin:/builder/bin:z" \
              -v "$(pwd)/build_scripts:/builder/build_scripts:ro,z" \
              -v "$(pwd)/tailscale:/builder/tailscale:ro,z" \
              -v "$(pwd)/keys:/builder/keys:ro,z" \
              -v "$(pwd)/upx:/builder/upx:ro,z" \
              -v "$(pwd)/go:/builder/go:ro,z" \
              -e TERM=xterm \
              -e FORCE=1 \
              ghcr.io/openwrt/sdk:${{ matrix.platform }}-V${{ env.OPENWRT_APK_SDK }} \
              bash /builder/build_scripts/build_apk.sh "${{ steps.get_build_version.outputs.version }}" "${{ matrix.platform }}"
          fi
        
      - name: Clean Up Build Scripts and Keys
        run: |
          rm -rf build_scripts
          rm -rf tailscale
          rm -rf keys
      
      # UPLOAD ARTIFACTS

      - name: Collect Build Artifacts
        env:
          artifacts: "Packages Packages.gz Packages.sig packages.adb tailscaled tailscale-${{ steps.get_build_version.outputs.version }}-r1.ipk tailscale-${{ steps.get_build_version.outputs.version }}-r1.apk"
        run: |
          mkdir -p "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}"

          for pattern in $artifacts; do
            if [ -f "bin/packages/${{ matrix.platform }}/base/$pattern" ]; then
              echo "Collecting artifact: $pattern"
              cp -v bin/packages/${{ matrix.platform }}/base/$pattern "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/" 2>/dev/null || true
            else
              if echo "${{ env.SKIP_TARGETS_24 }}" | grep -qw "${{ matrix.platform }}"; then
                echo "Collecting failed: Artifact not found $pattern (platform skipped)"
              elif echo "${{ env.SKIP_TARGETS_25 }}" | grep -qw "${{ matrix.platform }}"; then
                echo "Collecting failed: Artifact not found $pattern (platform skipped)"
              else
                echo "Collecting failed: Artifact not found $pattern"
              fi
            fi
          done
          
          du -b "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}"/tailscaled | cut -f1 > "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/bin.size"

          echo "${{ steps.get_build_version.outputs.version }}" > "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/version"

          if [ -f "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale-${{ steps.get_build_version.outputs.version }}-r1.ipk" ]; then
            sha256sum "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale-${{ steps.get_build_version.outputs.version }}-r1.ipk" | awk '{print $1}' > "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/ipk.sha256"
          fi
          if [ -f "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale-${{ steps.get_build_version.outputs.version }}-r1.apk" ]; then
            sha256sum "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale-${{ steps.get_build_version.outputs.version }}-r1.apk" | awk '{print $1}' > "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/apk.sha256"
          fi

          sha256sum "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscaled" | awk '{print $1}' > "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/bin.sha256"

          cp "repo/package/tailscale/files/tailscale.conf" "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale.conf"
          cp "repo/package/tailscale/files/tailscale.init" "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/tailscale.init"

          echo "Artifact collection attempted for platform: ${{ matrix.platform }}. Contents of artifact directory:"
          ls -la "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/
          if-no-files-found: error
          retention-days: 30
  
  # Deploy To Feed Barch

  deploy:
    name: Deploy Feed
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: v${{ needs.build.outputs.version }}
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      BUILD_DATE: ${{ needs.build.outputs.date }}
    steps:

      # PREPARE ARTIFACTS

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ${{ env.ARTIFACT_DIR }}
      
      - name: List Downloaded Artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R ${{ env.ARTIFACT_DIR }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: main
          path: repo

      # DEPLOY FEED

      - name: Deploy to Feed Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git for committing and pushing changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Create a new orphan branch for the feed
          mkdir deploy_workspace
          cd deploy_workspace
          git init

          # Set up remote with authentication using the GITHUB_TOKEN
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout --orphan feed

          # Fetch the latest main branch to get the feed template
          git fetch origin main --depth=1
          git checkout origin/main -- feed_template/

          # Copy feed template files to the root of the branch
          cp -r feed_template/* ./
          rm -rf feed_template

          # Create .nojekyll to prevent GitHub Pages from ignoring files with underscores
          touch .nojekyll
          
          cp -r ../${{ env.ARTIFACT_DIR }}/* ./

          # Generate HTML sections for each architecture and insert into index.html
          generate_arch_sections() {
            for arch_dir in */; do
              [ -d "$arch_dir" ] || continue
              arch=${arch_dir%/}

              echo "<details class=\"arch-section\">"
              echo "    <summary>📂 $arch</summary>"
              echo "    <table>"
              echo "        <thead>"
              echo "            <tr><th>File</th><th>Size</th><th>Sha256Sum</th></tr>"
              echo "        </thead>"
              echo "        <tbody>"

              for file_path in "$arch"/*; do
                [ -f "$file_path" ] || continue

                file=$(basename "$file_path")

                case "$file" in
                  *.ipk|*.apk|tailscaled|Packages|Packages.gz|Packages.sig|packages.adb)
                    ;;
                  *)
                    continue
                    ;;
                esac

                fsize=$(du -h "$file_path" | cut -f1)
                fsha256=$(sha256sum "$file_path" | cut -d' ' -f1)

                echo "            <tr>"
                echo "                <td><a href=\"$arch/$file\">$file</a></td>"
                echo "                <td class=\"size-cell\">$fsize</td>"
                echo "                <td class=\"sha256-cell\">$fsha256</td>"
                echo "            </tr>"
              done

              echo "        </tbody>"
              echo "    </table>"
              echo "</details>"
            done
          }
          
          # Use the function to generate sections and insert into index.html
          generate_arch_sections > tbody.tmp

          # Replace the placeholder section in index.html with the generated content
          sed -i '/<!-- arch-section-anchor -->/,/<!-- end-arch-section-anchor -->/ {
            /<!-- arch-section-anchor -->/!{
              /<!-- end-arch-section-anchor -->/!d
            }
          }' index.html
          sed -i '/<!-- arch-section-anchor -->/r tbody.tmp' index.html
          
          # Replace date anchor with the current build date
          current_date="${{ env.BUILD_DATE }}"
          sed -i '/<!-- date-anchor -->/,/<!-- end-date-anchor -->/ {
              /<span id="date">/ {
                  s#<span id="date">.*</span>#<span id="date">'"${current_date}"'</span>#
              }
          }' index.html

          # Replace version anchor with the current release version
          version=$(echo "${{ env.RELEASE_TAG }}" | sed 's/^v//')
          sed -i '/<!-- version-anchor -->/,/<!-- end-version-anchor -->/ {
              /<span id="version">/ {
                  s#<span id="version">.*</span>#<span id="version">'"${version}"'</span>#
              }
          }' index.html

          # Clean up temporary file
          rm -f tbody.tmp

          # Commit and push changes to the feed branch
          git add -A
          git commit -m "Update feed: ${{ env.BUILD_DATE }}"
          git push origin feed --force

  # Release To GitHub Release

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: v${{ needs.build.outputs.version }}
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      BUILD_DATE: ${{ needs.build.outputs.date }}
    steps:

      # PREPARE ARTIFACTS
      
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ${{ env.ARTIFACT_DIR }}
      
      - name: List Downloaded Artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R ${{ env.ARTIFACT_DIR }}

      # GENERATE RELEASE

      - name: Prepare Release Files and Generate Markdown
        id: generate_release_markdown
        run: |
          echo "Renaming packages to avoid conflicts..."

          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")

            ipk_old="$arch_dir/tailscale-${{ env.RELEASE_VERSION }}-r1.ipk"
            apk_old="$arch_dir/tailscale-${{ env.RELEASE_VERSION }}-r1.apk"

            ipk_new="$arch_dir/tailscale_${{ env.RELEASE_VERSION }}_${arch}.ipk"
            apk_new="$arch_dir/tailscale_${{ env.RELEASE_VERSION }}_${arch}.apk"

            if [ -f "$ipk_old" ]; then
              mv "$ipk_old" "$ipk_new"
              echo "Renamed IPK: $arch"
            fi

            if [ -f "$apk_old" ]; then
              mv "$apk_old" "$apk_new"
              echo "Renamed APK: $arch"
            fi
          done

          echo "Rename completed."
          echo "Current artifact structure:"
          ls -R "${{ env.ARTIFACT_DIR }}"

          table="| Target Platform / 目标平台 | IPK Package (OpenWrt) | APK Package (Next-Gen) |\n|:--- |:--- |:--- |"

          rows=""

          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")

            ipk_file=$(ls "$arch_dir"/tailscale_${{ env.RELEASE_VERSION }}_${arch}.ipk 2>/dev/null | xargs -n1 basename || echo "none")
            apk_file=$(ls "$arch_dir"/tailscale_${{ env.RELEASE_VERSION }}_${arch}.apk 2>/dev/null | xargs -n1 basename || echo "none")

            if [ "$ipk_file" != "none" ]; then
              ipk_link="[${ipk_file}](https://github.com/${{ env.REPO_SMALL_OWNER }}/${{ env.REPO_SMALL_NAME }}/releases/download/${{ env.RELEASE_TAG }}/${ipk_file})"
            else
              ipk_link="N/A"
            fi

            if [ "$apk_file" != "none" ]; then
              apk_link="[${apk_file}](https://github.com/${{ env.REPO_SMALL_OWNER }}/${{ env.REPO_SMALL_NAME }}/releases/download/${{ env.RELEASE_TAG }}/${apk_file})"
            else
              apk_link="N/A"
            fi

            rows="${rows}\n| ${arch} | ${ipk_link} | ${apk_link} |"
          done

          full_table="${table}${rows}"

          release_body="
          ## Smaller Tailscale / 更小的Tailscale  
          #### Version / 版本 : ${{ env.RELEASE_TAG }}
          #### Build Date / 构建日期 : ${{ env.BUILD_DATE }}
          #### Upstream Changelog / 上游更新日志 : [https://tailscale.com/changelog](https://tailscale.com/changelog)
          ---

          #### 本项目是为 OpenWRT 构建的 Tailscale 精简版本，使用官方 SDK 编译，旨在降低存储空间占用。    
          - 使用 OpenWRT 官方 SDK 编译。  
          - 采用 UPX 压缩技术大幅缩小二进制体积。  
          - 标准 IPK、APK 包，支持 opkg、apk 直接安装。  

          #### Minimalistic Tailscale build for OpenWRT using the official SDK.  
          - Compiled with official OpenWRT SDK.  
          - Significant size reduction via UPX compression.  
          - Standard IPK, APK packages for direct opkg, apk installation.  

          #### Architecture Check / 架构查询  
          Openwrt 24.10 or earlier / 或更早版本：:  
          \`\`\`bash
          opkg print-architecture | awk 'NF==3 && $3~/^[0-9]+$/ {print $2}' | tail -1
          \`\`\`

          Openwrt 25.12 or later / 或更高版本：:
          \`\`\`bash
          cat /etc/apk/arch
          \`\`\`
          ---
        
          #### Download Links / 下载清单
          > [!IMPORTANT]
          > 请根据设备架构与openwrt版本选择对应的安装包。
          > OpenWrt 24.10或更早版本请使用 .ipk 包，OpenWrt 25.12或更高版本请使用 .apk 包。
          >  
          > Please select the correct package for your device architecture.
          > Use .ipk for OpenWrt 24.10 or earlier, and .apk for OpenWrt 25.12 or later.

          <details open>
          <summary>Package List / 文件列表</summary>

          ${full_table}

          </details>
          "

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo -e "${release_body}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # PUBLISH RELEASE

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Smaller ${{ env.SOFTWARE_NAME }} ${{ env.RELEASE_TAG }}"
          body: ${{ steps.generate_release_markdown.outputs.release_body }}
          files: |
            ${{ env.ARTIFACT_DIR }}/**/*.ipk
            ${{ env.ARTIFACT_DIR }}/**/*.apk

      # SYNC REPO

      - name: Sync to Repo
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.git.createTag({
              owner: '${{ env.REPO_SMALL_OWNER }}',
              repo: '${{ env.REPO_SMALL_NAME }}',
              tag: '${{ env.RELEASE_TAG }}',
              message: 'Release ${{ env.RELEASE_TAG }}',
              object: '${{ github.sha }}',
              type: 'commit'
            })